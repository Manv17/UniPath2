name: Build installers

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Create runtime image with JavaFX
        run: mvn javafx:jlink

      - name: Show target folder
        shell: pwsh
        run: Get-ChildItem -Recurse target

      - name: Create EXE from app-image
        shell: pwsh
        run: |
          jpackage `
            --type exe `
            --name UniPath2 `
            --app-image target/app `
            --dest dist

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniPath2-windows
          path: dist/*

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build with Maven
        run: mvn -B clean package

      - name: Create runtime image with JavaFX
        run: mvn javafx:jlink

      - name: Show target folder
        run: ls -R target

      - name: Create DMG from app-image
        run: |
          jpackage \
            --type dmg \
            --name UniPath2 \
            --app-image target/app \
            --dest dist

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: UniPath2-macos
          path: dist/*
