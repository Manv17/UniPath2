name: Build and Release Installers

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build project
        run: mvn -B clean package

      - name: Create runtime image
        run: mvn javafx:jlink

      - name: Create MSI installer
        shell: pwsh
        run: |
          jpackage `
            --type msi `
            --name UniPath2 `
            --input target `
            --main-jar UniPath2-1.0-SNAPSHOT.jar `
            --main-class org.example.unipath2.ui.Home `
            --runtime-image target/app `
            --icon src/main/resources/org/example/unipath2/Icons/app-icon.ico `
            --win-shortcut `
            --win-menu `
            --dest dist

      - name: Upload MSI to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.msi


  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build project
        run: mvn -B clean package

      - name: Create runtime image
        run: mvn javafx:jlink

      - name: Create DMG installer
        run: |
          jpackage \
            --type dmg \
            --name UniPath2 \
            --input target \
            --main-jar UniPath2-1.0-SNAPSHOT.jar \
            --main-class org.example.unipath2.ui.Home \
            --runtime-image target/app \
            --icon src/main/resources/org/example/unipath2/Icons/app-icon.icns \
            --dest dist

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
